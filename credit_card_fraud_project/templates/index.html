<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Credit Card Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Credit Card Fraud Detection System</h1>

<form method="POST">
    <label>Transaction Amount:</label>
    <input type="number" name="amount" required><br><br>

    <label>Transaction Time:</label>
    <input type="time" name="time" required><br><br>

    <label>Location:</label>
    <select name="location">
        <option>Local (Home City)</option>
        <option>International</option>
    </select><br><br>

    <label>Merchant:</label>
    <select name="merchant">
        <option>Retail/Groceries</option>
        <option>Crypto Exchange</option>
    </select><br><br>

    <label>Transactions in 24 Hours:</label>
    <input type="number" name="tx_count" required><br><br>

    <button type="submit">Check Transaction</button>
</form>

{% if result %}
<h2>{{ result.status }}</h2>
<p>Risk Score: {{ result.score }}%</p>
{% endif %}

</body>
</html>
